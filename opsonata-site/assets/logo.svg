<svg width="1024" height="256" viewBox="0 0 1024 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      .logo-text {
        font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 96px;
        dominant-baseline: middle;
      }
      .logo-text-green { fill: #27C281; font-weight: 700; }
      .logo-text-white { fill: #FFFFFF; font-weight: 400; }
    </style>
  </defs>

  <!-- Orange bubbles -->
  <circle cx="96" cy="160" r="14" fill="#FF9A3C" />
  <circle cx="220" cy="70" r="14" fill="#FF9A3C" />

  <!-- Flow curve -->
  <path d="M96 160 C 130 110, 170 90, 220 70"
        fill="none" stroke="#27C281" stroke-width="8" stroke-linecap="round" />

  <!-- OpS icon text -->
  <text x="120" y="150" class="logo-text logo-text-green">OpS</text>

  <!-- Wordmark -->
  <text x="360" y="140" class="logo-text">
    <tspan class="logo-text-green">OpS</tspan><tspan class="logo-text-white">onata</tspan>
  </text>
</svg>
